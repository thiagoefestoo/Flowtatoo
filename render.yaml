services:
  - type: web
    name: flowtatoo-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DB_SYNC
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: SETUP_ADMIN_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
